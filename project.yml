name: HonestFastingTimer
options:
  bundleIdPrefix: com.lumen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "AMJGQSTR94"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"

targets:
  HonestFastingTimer:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Widget/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumen.honestfastingtimer.widget
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Sources/App/HonestFastingTimer.entitlements
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Honest Fasting
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSUserNotificationUsageDescription: "Notifications are used to alert you when your fast is complete."
        UIBackgroundModes:
          - processing
          - fetch
        NSSupportsLiveActivities: false
    entitlements:
      path: Sources/App/HonestFastingTimer.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lumen.honestfastingtimer
    storekitConfiguration: HonestFastingTimer.storekit
    dependencies:
      - target: HonestFastingTimerWidgetExtension
        embed: true

  HonestFastingTimerWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/Models/ActiveFast.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumen.honestfastingtimer.widget
        INFOPLIST_FILE: Sources/Widget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/WidgetExtension.entitlements
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: Honest Fasting Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/Widget/WidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lumen.honestfastingtimer

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Generate project
        run: xcodegen generate

      - name: Build iOS
        run: |
          xcodebuild -project HonestFastingTimer.xcodeproj \
            -scheme HonestFastingTimer \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build 2>&1 | tee build.log | tail -20
        shell: bash
        env:
          CI: true

      - name: Boot simulator for screenshot
        run: |
          xcrun simctl boot "iPhone 16" || true
          sleep 2

      - name: Capture screenshot
        run: |
          xcrun simctl io "iPhone 16" screenshot /tmp/screenshot.png || true
          ls -la /tmp/screenshot.png 2>/dev/null || echo "screenshot skipped"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: /tmp/screenshot.png
          retention-days: 1

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3